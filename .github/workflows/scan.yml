name: Scan Polymarket Weather Edges

on:
  schedule:
    - cron: "*/5 * * * *"    # כל 5 דקות (המינימום של GitHub Actions)
  workflow_dispatch:           # הרצה ידנית
  push:
    branches: [main]
    paths:
      - "**.py"
      - "requirements.txt"
      - ".github/workflows/scan.yml"

permissions:
  contents: write   # נדרש כדי לדחוף בחזרה את קבצי ה-state
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  scan-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scanner
        run: python main.py

      - name: Persist state files back to main
        # שומר את forecasts.jsonl / observations.json / history.json / accuracy.json
        # כדי שמעקב הדיוק יצטבר בין הרצות. ה-workflow לא יורץ מחדש בגלל הפוש הזה
        # כי מסנן ה-paths ב-`on: push` לא כולל קבצי docs.
        run: |
          set -e
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # מוסיפים רק קבצים שקיימים (observations.json / accuracy.json
          # עשויים שלא להיווצר בהרצות הראשונות — לפני שיום נסגר)
          for f in docs/forecasts.jsonl docs/observations.json \
                   docs/history.json    docs/accuracy.json; do
            [ -f "$f" ] && git add "$f"
          done
          if git diff --cached --quiet; then
            echo "אין שינויים ב-state לקומיט."
          else
            git commit -m "chore(state): snapshot $(date -u +'%Y-%m-%dT%H:%MZ') [skip ci]"
            for i in 1 2 3; do
              if git push; then
                exit 0
              fi
              echo "push נכשל (ניסיון $i) — מושכים מחדש ומנסים שוב"
              git pull --rebase
            done
            echo "push נכשל אחרי 3 ניסיונות — ממשיכים בלי לחסום את deploy"
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
